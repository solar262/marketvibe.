  <!-- Kill Vercel Development Toolbar -->
  <style>
    #vercel-speed-insights-widget,
    .vercel-toolbar-root,
    #__next-vercel-toolbar,
    [data-vercel-toolbar],
    [data-vercel-edit-mode],
    .vercel-toolbar-root-container,
    div[class*="vercel-toolbar"],
    vercel-live-feedback,
    #vercel-live-feedback,
    [id*="vercel"],
    [class*="VercelToolbar"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
      height: 0 !important;
      width: 0 !important;
      overflow: hidden !important;
      position: absolute !important;
      left: -9999px !important;
      z-index: -9999 !important;
    }
  </style>
  <script>
    // NUCLEAR MANEUVER: Kill Vercel Toolbar & Feedback Widgets
    (function() {
      const selectors = [
        '#vercel-speed-insights-widget',
        '.vercel-toolbar-root',
        '#__next-vercel-toolbar',
        '[data-vercel-toolbar]',
        '[data-vercel-edit-mode]',
        '.vercel-toolbar-root-container',
        'vercel-live-feedback',
        '#vercel-live-feedback'
      ];

      const kill = () => {
        // 1. Selector-based kill
        selectors.forEach(s => {
          document.querySelectorAll(s).forEach(el => el.remove());
        });
        
        // 2. Attribute-based kill
        document.querySelectorAll('[id*="vercel"], [class*="vercel"], [data-vercel-toolbar]').forEach(el => {
          el.remove();
        });

        // 3. Shadow DOM Deep Scan
        const allElements = document.querySelectorAll('*');
        allElements.forEach(el => {
          if (el.shadowRoot) {
            const vercelInShadow = el.shadowRoot.querySelectorAll('[id*="vercel"], [class*="vercel"]');
            if (vercelInShadow.length > 0) el.remove();
          }
        });

        // 4. Global Variable Wipe
        window.__VERCEL_TOOLBAR = undefined;
        window.__VERCEL_LIVE_FEEDBACK = undefined;
      };
      
      // Run immediately
      kill();
      
      // High-frequency Observer
      const observer = new MutationObserver(kill);
      observer.observe(document.documentElement, {
        childList: true,
        subtree: true
      });
      
      // Aggressive interval for the first 10 seconds
      const fastInterval = setInterval(kill, 100);
      setTimeout(() => {
        clearInterval(fastInterval);
        // Permanent fallback interval
        setInterval(kill, 1000);
      }, 10000);
    })();
  </script>
