name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev
      - run: npm run build
