name: MarketVibe operations

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
    - cron: "12,42 * * * *"
    - cron: "25 * * * *"
    - cron: "10 */4 * * *"
    - cron: "40 2 * * *"
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: marketvibe-operations-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obtain short-lived GitHub identity token
        id: oidc
        shell: bash
        run: |
          token_response=$(curl --fail --silent --show-error \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https%3A%2F%2Fwww.marketvibe1.com%2Fautomation")
          echo "token=$(echo "$token_response" | jq -r .value)" >> "$GITHUB_OUTPUT"

      - name: Run scheduled operation
        env:
          TOKEN: ${{ steps.oidc.outputs.token }}
          SCHEDULE: ${{ github.event.schedule }}
        shell: bash
        run: |
          run_task() {
            curl --fail --silent --show-error --retry 2 --max-time 290 \
              -X POST -H "Authorization: Bearer $TOKEN" \
              "https://www.marketvibe1.com/api/automation/run?task=$1"
          }
          case "$SCHEDULE" in
            "7,22,37,52 * * * *") run_task buyer-pipeline; run_task email-operations ;;
            "12,42 * * * *") run_task integration-delivery ;;
            "25 * * * *") run_task operations-control ;;
            "10 */4 * * *") run_task continuous-supply ;;
            "40 2 * * *") run_task operations-learning ;;
            "10 3 * * *") run_task governance-control ;;
            *) run_task buyer-pipeline; run_task email-operations; run_task integration-delivery; run_task operations-control; run_task continuous-supply; run_task operations-learning; run_task governance-control ;;
          esac
